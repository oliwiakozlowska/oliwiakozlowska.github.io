<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oliwia Kozłowska</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: #f8fafc;
      color: #0f172a;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 60px;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 420px;
      padding: 40px;
    }

    img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 26px;
      margin: 10px 0 5px;
      font-weight: 600;
    }

    p.role {
      margin: 0;
      font-size: 14px;
      color: #475569;
    }

    p.desc {
      margin-top: 15px;
      font-size: 14px;
      color: #64748b;
      line-height: 1.5;
    }

    .links {
      margin-top: 25px;
    }

    a {
      display: block;
      margin: 10px auto;
      padding: 10px 14px;
      width: 180px;
      text-decoration: none;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      color: #0f172a;
      font-size: 14px;
      transition: 0.2s;
    }

    a:hover {
      border-color: #94a3b8;
      transform: translateY(-1px);
    }
  </style>
</head>

<body>

  <div class="container">

    <img src="foto.jpg" alt="Oliwia Kozłowska">

    <h1>Oliwia Kozłowska</h1>

    <p class="role">
      Bioinformatician & Biotechnologist (MSc)
    </p>

    <p class="desc">
      Bioinformatics and biotechnology graduate focused on data analysis,
      computational biology and life science applications.
    </p>

    <div class="links">
      <a href="https://github.com/oliwiakozlowska" target="_blank">GitHub</a>
      <a href="https://www.linkedin.com/in/oliwia-koz%C5%82owska-554aa53b9/" target="_blank">LinkedIn</a>
    </div>

  </div>

</body>
</html>
